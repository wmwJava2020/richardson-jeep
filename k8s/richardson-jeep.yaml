apiVersion: v1
kind: Namespace
metadata:
  name: richardson-jeep

---
# ----------------------------------------------------------------------
# ConfigMap shared by all services - common environment variable values
# ----------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: rj-config
  namespace: richardson-jeep
data:
  EUREKA_URI: "http://discovery-server:8761/eureka"
  CONFIG_SERVER_URI: "http://config-server:8888"
  ZIPKIN_URI: "http://zipkin:9411/api/v2/spans"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_USERNAME: "root"
  DB_PASSWORD: "root"

---
# ----------------------------------------------------------------------
# MySQL
# ----------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: richardson-jeep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
          volumeMounts:
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-init
          configMap:
            name: mysql-init-scripts

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: richardson-jeep
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS inventory_db;
    CREATE DATABASE IF NOT EXISTS order_db;
    CREATE DATABASE IF NOT EXISTS notification_db;
    CREATE DATABASE IF NOT EXISTS customer_db;

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: richardson-jeep
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
# ----------------------------------------------------------------------
# Zipkin
# ----------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: richardson-jeep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin
  template:
    metadata:
      labels:
        app: zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:latest
          ports:
            - containerPort: 9411

---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: richardson-jeep
spec:
  selector:
    app: zipkin
  ports:
    - port: 9411
      targetPort: 9411

---
# ----------------------------------------------------------------------
# Discovery Server (Eureka)
# ----------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: richardson-jeep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      containers:
        - name: discovery-server
          image: richardson-jeep-discovery-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: richardson-jeep
spec:
  selector:
    app: discovery-server
  ports:
    - port: 8761
      targetPort: 8761

---
# ----------------------------------------------------------------------
# Config Server
# ----------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: richardson-jeep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: richardson-jeep-config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          envFrom:
            - configMapRef:
                name: rj-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: richardson-jeep
spec:
  selector:
    app: config-server
  ports:
    - port: 8888
      targetPort: 8888

---
