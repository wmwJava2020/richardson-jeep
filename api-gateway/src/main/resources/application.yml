server:
  port: 1921

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # ---------------------------------------------------------
        # Inventory Service
        # ---------------------------------------------------------
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory,/api/v1/inventory/**
          filters:
            - name: CircuitBreaker
              args:
                name: inventoryServiceCB
                fallbackUri: forward:/fallback/inventory
            - AddRequestHeader=X-Gateway-Source, richardson-jeep-gateway

        # ---------------------------------------------------------
        # Order Service
        # ---------------------------------------------------------
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders,/api/v1/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderServiceCB
                fallbackUri: forward:/fallback/orders
            - AddRequestHeader=X-Gateway-Source, richardson-jeep-gateway

        # ---------------------------------------------------------
        # Notification Service
        # ---------------------------------------------------------
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications,/api/v1/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notifications
            - AddRequestHeader=X-Gateway-Source, richardson-jeep-gateway

        # ---------------------------------------------------------
        # Customer Service
        # ---------------------------------------------------------
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/api/v1/customers,/api/v1/customers/**
          filters:
            - name: CircuitBreaker
              args:
                name: customerServiceCB
                fallbackUri: forward:/fallback/customers
            - AddRequestHeader=X-Gateway-Source, richardson-jeep-gateway

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      inventoryServiceCB:
        base-config: default
      orderServiceCB:
        base-config: default
      notificationServiceCB:
        base-config: default
      customerServiceCB:
        base-config: default
  circuitbreakers:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URI:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: INFO
