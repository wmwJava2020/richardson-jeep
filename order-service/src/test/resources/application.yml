spring:
  config:
    import: optional:configserver:disabled
  datasource:
    url: jdbc:h2:mem:order_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

management:
  tracing:
    sampling:
      probability: 0

app:
  order:
    auto-confirm: true
    order-number-prefix: "RJ-ORD-"
