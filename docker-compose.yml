version: "3.9"

networks:
  richardson-jeep-net:
    driver: bridge

volumes:
  mysql-data:

services:
  # --------------------------------------------------------------
  # Datastore
  # --------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: rj-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - richardson-jeep-net

  # --------------------------------------------------------------
  # Observability stack
  # --------------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: rj-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - richardson-jeep-net

  prometheus:
    image: prom/prometheus:latest
    container_name: rj-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - richardson-jeep-net

  grafana:
    image: grafana/grafana:latest
    container_name: rj-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - richardson-jeep-net

  # --------------------------------------------------------------
  # Platform services
  # --------------------------------------------------------------
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    container_name: rj-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - richardson-jeep-net

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: rj-config-server
    restart: unless-stopped
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - richardson-jeep-net

  # --------------------------------------------------------------
  # Business services
  # --------------------------------------------------------------
  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: rj-inventory-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: inventory_db
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_URI: http://discovery-server:8761/eureka
      CONFIG_SERVER_URI: http://config-server:8888
      ZIPKIN_URI: http://zipkin:9411/api/v2/spans
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - richardson-jeep-net

  customer-service:
    build:
      context: .
      dockerfile: customer-service/Dockerfile
    container_name: rj-customer-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: customer_db
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_URI: http://discovery-server:8761/eureka
      CONFIG_SERVER_URI: http://config-server:8888
      ZIPKIN_URI: http://zipkin:9411/api/v2/spans
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - richardson-jeep-net

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: rj-notification-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: notification_db
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_URI: http://discovery-server:8761/eureka
      CONFIG_SERVER_URI: http://config-server:8888
      ZIPKIN_URI: http://zipkin:9411/api/v2/spans
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - richardson-jeep-net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: rj-order-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: order_db
      DB_USERNAME: root
      DB_PASSWORD: root
      EUREKA_URI: http://discovery-server:8761/eureka
      CONFIG_SERVER_URI: http://config-server:8888
      ZIPKIN_URI: http://zipkin:9411/api/v2/spans
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      inventory-service:
        condition: service_started
      customer-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - richardson-jeep-net

  # --------------------------------------------------------------
  # Edge
  # --------------------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: rj-api-gateway
    restart: unless-stopped
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka
      CONFIG_SERVER_URI: http://config-server:8888
      ZIPKIN_URI: http://zipkin:9411/api/v2/spans
    ports:
      - "1921:1921"
    depends_on:
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      inventory-service:
        condition: service_started
      customer-service:
        condition: service_started
      notification-service:
        condition: service_started
      order-service:
        condition: service_started
    networks:
      - richardson-jeep-net
